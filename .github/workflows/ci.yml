name: CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: agentic-platform   # ✅ IMPORTANT FIX

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8 pytest

      # 🔥 Relax minor lint but keep critical ones
      - name: Run Lint
        run: |
          flake8 . --ignore=E302,W292

      - name: Run Tests
        run: |
          pytest