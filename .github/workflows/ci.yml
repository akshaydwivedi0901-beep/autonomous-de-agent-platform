name: CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: agentic-platform

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8 pytest

      # 🔥 NOW FAIL IF BAD CODE
      - name: Lint (blocking)
        run: |
          flake8 .

      # 🔥 ADD REAL TESTS (even basic)
      - name: Run Tests
        run: |
          pytest