name: Deploy AI Agent

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: "Action"
        required: true
        default: "deploy-only"
        type: choice
        options:
          - deploy-only
          - spin-up-and-deploy
          - tear-down

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: ai-agent
  EKS_CLUSTER: ai-agent-cluster
  AWS_ACCOUNT_ID: 416573464919
  DEPLOYMENT_NAME: ai-agent

jobs:

  build:
    name: Build and push to ECR
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.tag.outputs.image_uri }}
    defaults:
      run:
        working-directory: agentic-platform
    steps:
      - uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          IMAGE_TAG="${SHORT_SHA}-$(date +%Y%m%d%H%M%S)"
          IMAGE_URI="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}"
          echo "image_uri=${IMAGE_URI}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login and push to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          docker build -t ${{ steps.tag.outputs.image_uri }} -f docker/Dockerfile .
          docker push ${{ steps.tag.outputs.image_uri }}

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.action != 'tear-down'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check cluster exists and deploy
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }} 2>/dev/null || { echo "Cluster not found - skipping deploy"; exit 0; }
          kubectl create secret generic groq-secret --from-literal=GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic snowflake-secret --from-literal=SNOWFLAKE_USER="${{ secrets.SNOWFLAKE_USER }}" --from-literal=SNOWFLAKE_PASSWORD="${{ secrets.SNOWFLAKE_PASSWORD }}" --from-literal=SNOWFLAKE_ACCOUNT="${{ secrets.SNOWFLAKE_ACCOUNT }}" --from-literal=SNOWFLAKE_WAREHOUSE="${{ secrets.SNOWFLAKE_WAREHOUSE }}" --from-literal=SNOWFLAKE_DATABASE="${{ secrets.SNOWFLAKE_DATABASE }}" --from-literal=SNOWFLAKE_SCHEMA="${{ secrets.SNOWFLAKE_SCHEMA }}" --from-literal=SNOWFLAKE_ROLE="${{ secrets.SNOWFLAKE_ROLE }}" --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic app-secret --from-literal=API_KEY="${{ secrets.API_KEY }}" --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f agentic-platform/k8s/chroma-pvc.yaml
          kubectl apply -f agentic-platform/k8s/redis-deployment.yaml
          kubectl apply -f agentic-platform/k8s/deployment.yml
          kubectl apply -f agentic-platform/k8s/service.yaml
          kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} ${{ env.DEPLOYMENT_NAME }}=${{ needs.build.outputs.image_uri }}
          kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} --timeout=300s

      - name: Rollback on failure
        if: failure()
        run: kubectl rollout undo deployment/${{ env.DEPLOYMENT_NAME }} || true

  tear-down:
    name: Tear down EKS cluster
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'tear-down'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Destroy cluster
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }} || true
          kubectl delete deployment ai-agent redis --ignore-not-found=true || true
          kubectl delete svc ai-agent-service redis --ignore-not-found=true || true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform destroy
        working-directory: terraform
        run: terraform init && terraform destroy -auto-approve