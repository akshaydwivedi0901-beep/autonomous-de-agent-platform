name: Deploy to EKS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: agentic-platform

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region us-east-1 | \
          docker login --username AWS --password-stdin 416573464919.dkr.ecr.us-east-1.amazonaws.com

      - name: Build Docker image
        run: |
          docker build -t ai-agent -f docker/Dockerfile .

      - name: Tag image
        run: |
          docker tag ai-agent:latest 416573464919.dkr.ecr.us-east-1.amazonaws.com/ai-agent:latest

      - name: Push to ECR
        run: |
          docker push 416573464919.dkr.ecr.us-east-1.amazonaws.com/ai-agent:latest

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region us-east-1 --name ai-agent-cluster

      - name: Deploy to EKS
        run: |
          kubectl apply -f k8s/