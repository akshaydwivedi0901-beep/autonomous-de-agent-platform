name: Deploy AI Agent

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: ai-agent
  EKS_CLUSTER: ai-agent-cluster
  AWS_ACCOUNT_ID: 416573464919
  DEPLOYMENT_NAME: ai-agent

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: agentic-platform

    steps:
      # ✅ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Unique image tag (commit SHA)
      - name: Set Image Tag
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

      # ✅ AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ✅ Login to ECR
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

      # ✅ Build Docker image
      - name: Build Docker image
        run: |
          docker build \
            -t $ECR_REPOSITORY:$IMAGE_TAG \
            -f docker/Dockerfile .

      # ✅ Tag image
      - name: Tag image
        run: |
          docker tag $ECR_REPOSITORY:$IMAGE_TAG \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG

      # ✅ Push image
      - name: Push to ECR
        run: |
          docker push \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG

      # ✅ Configure kubectl
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
          --region $AWS_REGION \
          --name $EKS_CLUSTER

      # 🔥 IMPORTANT: Apply manifests FIRST (fixes your error)
      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/deployment.yml
          kubectl apply -f k8s/service.yaml

      # ✅ Update deployment image
      - name: Update Deployment Image
        run: |
          kubectl set image deployment/$DEPLOYMENT_NAME \
          $DEPLOYMENT_NAME=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG

      # ✅ Wait for rollout
      - name: Verify Rollout
        run: |
          kubectl rollout status deployment/$DEPLOYMENT_NAME --timeout=180s

      # 🔍 Debug if failure
      - name: Debug on failure
        if: failure()
        run: |
          echo "===== POD STATUS ====="
          kubectl get pods -l app=ai-agent

          echo "===== DESCRIBE ====="
          kubectl describe pods -l app=ai-agent

          echo "===== LOGS ====="
          kubectl logs -l app=ai-agent --tail=100 || true

      # 🔄 Rollback if failure
      - name: Rollback on failure
        if: failure()
        run: |
          kubectl rollout undo deployment/$DEPLOYMENT_NAME

      # ✅ Success message
      - name: Deployment Success
        if: success()
        run: echo "🚀 Deployment completed successfully!"