apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-agent
  labels:
    app: ai-agent
spec:
  # ⚠️ replicas removed — HPA manages this now (hpa.yaml)
  revisionHistoryLimit: 3

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0    # zero-downtime deploys

  selector:
    matchLabels:
      app: ai-agent

  template:
    metadata:
      labels:
        app: ai-agent
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"

    spec:
      containers:
        - name: ai-agent
          image: 416573464919.dkr.ecr.us-east-1.amazonaws.com/ai-agent:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8000

          env:
            # =============================
            # GROQ — now a Secret (was hardcoded before!)
            # =============================
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: groq-secret
                  key: GROQ_API_KEY

            # =============================
            # SNOWFLAKE
            # =============================
            - name: SNOWFLAKE_USER
              valueFrom:
                secretKeyRef:
                  name: snowflake-secret
                  key: SNOWFLAKE_USER

            - name: SNOWFLAKE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: snowflake-secret
                  key: SNOWFLAKE_PASSWORD

            - name: SNOWFLAKE_ACCOUNT
              valueFrom:
                secretKeyRef:
                  name: snowflake-secret
                  key: SNOWFLAKE_ACCOUNT

            - name: SNOWFLAKE_WAREHOUSE
              valueFrom:
                secretKeyRef:
                  name: snowflake-secret
                  key: SNOWFLAKE_WAREHOUSE

            - name: SNOWFLAKE_DATABASE
              valueFrom:
                secretKeyRef:
                  name: snowflake-secret
                  key: SNOWFLAKE_DATABASE

            - name: SNOWFLAKE_SCHEMA
              valueFrom:
                secretKeyRef:
                  name: snowflake-secret
                  key: SNOWFLAKE_SCHEMA

            - name: SNOWFLAKE_ROLE
              valueFrom:
                secretKeyRef:
                  name: snowflake-secret
                  key: SNOWFLAKE_ROLE

            # =============================
            # APP CONFIG (non-sensitive → ConfigMap)
            # =============================
            - name: ENVIRONMENT
              value: "prod"

            - name: DB_TYPE
              value: "snowflake"

            - name: ENABLE_RAG
              value: "true"

            - name: ENABLE_MEMORY
              value: "true"

            - name: REDIS_URL
              value: "redis://redis:6379/0"

            - name: LARGE_MODEL
              value: "llama3-70b-8192"

            - name: SMALL_MODEL
              value: "llama-3.1-8b-instant"

          # =============================
          # HEALTH CHECKS
          # =============================
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 2

          # =============================
          # RESOURCE LIMITS (tuned for HPA)
          # =============================
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"