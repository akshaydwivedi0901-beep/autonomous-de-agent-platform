apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-agent-hpa
  labels:
    app: ai-agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-agent

  minReplicas: 2     # always 2 for HA
  maxReplicas: 10    # cap for cost control

  metrics:
    # Scale on CPU
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60    # scale out before saturation

    # Scale on memory
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30    # fast scale-up (AI traffic is bursty)
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30             # add max 2 pods per 30s

    scaleDown:
      stabilizationWindowSeconds: 300   # slow scale-down (5 min cooldown)
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60             # remove 1 pod per minute