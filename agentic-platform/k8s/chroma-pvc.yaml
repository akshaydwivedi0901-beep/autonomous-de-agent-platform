apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: chroma-storage
provisioner: kubernetes.io/aws-ebs
parameters:
  type: gp2
  fsType: ext4
reclaimPolicy: Retain
allowVolumeExpansion: true
volumeBindingMode: WaitForFirstConsumer
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chroma-pvc
  labels:
    app: ai-agent
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: chroma-storage
  resources:
    requests:
      storage: 5Gi
