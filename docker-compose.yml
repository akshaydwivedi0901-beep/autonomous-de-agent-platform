services:

  ai-agent:
    build:
      context: ./agentic-platform
      dockerfile: docker/Dockerfile
    container_name: ai-agent
    ports:
      - "8000:8000"
    env_file:
      - ./agentic-platform/.env
    environment:
      - ENVIRONMENT=dev
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_DB_PATH=/data/chroma_db
      - ENABLE_RAG=false
      - ENABLE_MEMORY=true
    volumes:
      - chroma_data:/data/chroma_db
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  chroma_data:
  redis_data:
