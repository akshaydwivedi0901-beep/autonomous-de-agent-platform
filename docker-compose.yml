version: "3.9"

# ============================================================
# LOCAL DEVELOPMENT STACK
# Full platform running on your machine — no AWS costs
# Usage: docker-compose up --build
# ============================================================

services:

  # ============================================================
  # AI AGENT — main app
  # ============================================================
  ai-agent:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ai-agent
    ports:
      - "8000:8000"
    env_file:
      - .env                    # your local .env file
    environment:
      - ENVIRONMENT=dev
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_DB_PATH=/data/chroma_db
      - ENABLE_RAG=true
      - ENABLE_MEMORY=true
    volumes:
      - chroma_data:/data/chroma_db    # persistent ChromaDB locally too
      - ./app:/app/app                 # hot reload — code changes reflect instantly
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ============================================================
  # REDIS — memory + caching + queue
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ============================================================
  # REDIS COMMANDER — Redis UI (dev only)
  # Access at http://localhost:8081
  # ============================================================
  redis-ui:
    image: rediscommander/redis-commander:latest
    container_name: redis-ui
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis
    profiles:
      - debug    # only starts with: docker-compose --profile debug up

  # ============================================================
  # PROMETHEUS — metrics scraping
  # Access at http://localhost:9090
  # ============================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    profiles:
      - monitoring

# ============================================================
# VOLUMES
# ============================================================
volumes:
  chroma_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local